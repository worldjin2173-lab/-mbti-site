        <div class="result-section">
            <h3>💪 이런 점은 개선해봐요</h3>
            <ul class="result-list">${data.weakness.map(w=>`<li>${w}</li>`).join('')}</ul>
        </div>
        <div class="result-section">
            <h3>💕 연애 스타일</h3>
            <p class="section-text">${data.love}</p>
        </div>
        <div class="result-section">
            <h3>💼 추천 직업</h3>
            <p class="section-text">${data.career}</p>
        </div>
        <div class="result-section">
            <h3>🌟 나와 같은 유명인</h3>
            <p class="famous-text">${data.famous}</p>
        </div>

        <div class="compat">
            <div class="compat-item good">
                <span>💚 잘 맞는 유형</span>
                <strong>${data.good.join(', ')}</strong>
            </div>
            <div class="compat-item bad">
                <span>💔 불편한 유형</span>
                <strong>${data.bad.join(', ')}</strong>
            </div>
        </div>

        <div class="product-section">
            <h3>🎁 ${type}에게 딱 맞는 여름 추천템!</h3>
            <p class="product-sub">✅ 클릭하면 쿠팡에서 바로 확인할 수 있어요!</p>
            ${data.products.map(p=>`
                <a href="${p.url}" target="_blank" class="product-card">
                    <span class="product-emoji">${p.emoji}</span>
                    <div class="product-info">
                        <strong>${p.name}</strong>
                        <span>${p.desc}</span>
                    </div>
                    <span class="product-arrow">→</span>
                </a>
            `).join('')}
            <p class="coupang-notice">※ 이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</p>
        </div>

        <div class="share-section">
            <h3>📤 친구에게 공유하기</h3>
            <p class="share-sub">친구의 MBTI도 알아보세요! 😊</p>
            <button class="share-btn" onclick="copyLink()">🔗 링크 복사해서 공유하기</button>
        </div>
        <button class="btn-retry" onclick="location.href='index.html'">🔄 다시 테스트하기</button>
    `;

    function copyLink(){
        navigator.clipboard.writeText(window.location.origin + window.location.pathname.replace('result.html','index.html'));
        alert('링크가 복사됐어요! 친구에게 공유해보세요 😊');
    }
    </script>
</body>
</html>
