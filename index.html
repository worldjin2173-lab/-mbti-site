<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/style.css">

    <meta property="og:title" content="🔮 MBTI 유형 검사하기" />
    <meta property="og:description" content="나의 진짜 성격 유형은? 20가지 질문으로 알아보는 MBTI 테스트!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://worldjin2173-lab.github.io/-mbti-site" />
    <meta property="og:image" content="https://worldjin2173-lab.github.io/-mbti-site/images/og-image.jpg" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="심리테스트 연구소" />
</head>
<body>

    <!-- 시작 화면 -->
    <div id="ms-start" class="ms-screen active">
        <div class="container">
            <div class="emoji-big">🔮</div>
            <h1>MBTI 유형 검사하기</h1>
            <p class="subtitle">20가지 질문으로 알아보는<br>나의 진짜 성격 유형</p>
            <div class="stats">
                <span>👥 누적 참여 1,284,927명</span>
            </div>
            <button class="btn-start" onclick="msStart()">✨ 테스트 시작하기 →</button>
            <p class="notice">※ 약 3분 소요 · 무료</p>
        </div>
    </div>

    <!-- 테스트 화면 -->
    <div id="ms-test" class="ms-screen">
        <div class="container">
            <div class="progress-wrap">
                <div class="progress-info">
                    <span id="ms-prog-txt">1 / 20</span>
                    <span id="ms-prog-pct">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="ms-prog-fill"></div>
                </div>
            </div>
            <div class="question-card">
                <div class="q-emoji" id="ms-q-emoji"></div>
                <h2 class="question" id="ms-q-text"></h2>
            </div>
            <div class="answers">
                <button class="answer-btn" id="ms-btn-a" onclick="msAnswer('a')"></button>
                <button class="answer-btn" id="ms-btn-b" onclick="msAnswer('b')"></button>
            </div>
        </div>
    </div>

    <!-- 로딩 화면 -->
    <div id="ms-loading" class="ms-screen">
        <div class="container">
            <div class="loading-emoji">🔮</div>
            <h2>분석 중...</h2>
            <p>당신의 성격 유형을 분석하고 있어요</p>
            <div class="loading-bar">
                <div class="loading-fill" id="ms-load-fill"></div>
            </div>
        </div>
    </div>

    <!-- 결과 화면 -->
    <div id="ms-result" class="ms-screen">
        <div class="container" style="padding:0;overflow:hidden;">
            <div id="ms-res-header" style="padding:30px 20px;text-align:center;color:white;">
                <div id="ms-res-emoji" style="font-size:70px;margin-bottom:10px;"></div>
                <div id="ms-res-type" style="font-size:48px;font-weight:900;"></div>
                <div id="ms-res-name" style="font-size:22px;font-weight:700;margin-top:4px;opacity:0.9;"></div>
            </div>
            <div style="padding:24px 20px;">
<!-- 유명인 섹션 추가 -->
<div class="result-section">
    <h3>🌟 같은 유형의 유명인</h3>
    <p class="section-text" id="ms-famous"></p>
</div>

                <!-- 성격 설명 -->
                <div class="result-section">
                    <h3>✨ 성격 설명</h3>
                    <p class="section-text" id="ms-desc"></p>
                </div>

                <!-- 비율 바 -->
                <div class="result-section">
                    <h3>📊 나의 성향 비율</h3>
                    <div style="margin-top:10px;">
                        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
                            <span id="lbl-e"></span><span id="lbl-i"></span>
                        </div>
                        <div style="background:#eee;border-radius:10px;height:10px;margin-bottom:12px;">
                            <div id="bar-e" style="background:linear-gradient(135deg,#667eea,#764ba2);height:10px;border-radius:10px;transition:width 1s;"></div>
                        </div>
                        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
                            <span id="lbl-n"></span><span id="lbl-s"></span>
                        </div>
                        <div style="background:#eee;border-radius:10px;height:10px;margin-bottom:12px;">
                            <div id="bar-n" style="background:linear-gradient(135deg,#667eea,#764ba2);height:10px;border-radius:10px;transition:width 1s;"></div>
                        </div>
                        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
                            <span id="lbl-t"></span><span id="lbl-f"></span>
                        </div>
                        <div style="background:#eee;border-radius:10px;height:10px;margin-bottom:12px;">
                            <div id="bar-t" style="background:linear-gradient(135deg,#667eea,#764ba2);height:10px;border-radius:10px;transition:width 1s;"></div>
                        </div>
                        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
                            <span id="lbl-p"></span><span id="lbl-j"></span>
                        </div>
                        <div style="background:#eee;border-radius:10px;height:10px;margin-bottom:12px;">
                            <div id="bar-p" style="background:linear-gradient(135deg,#667eea,#764ba2);height:10px;border-radius:10px;transition:width 1s;"></div>
                        </div>
                    </div>
                </div>

                <!-- 강점/약점 -->
                <div class="result-section">
                    <h3>💪 강점</h3>
                    <p class="section-text" id="ms-str"></p>
                </div>
                <div class="result-section">
                    <h3>😅 약점</h3>
                    <p class="section-text" id="ms-weak"></p>
                </div>
                <div class="result-section">
                    <h3>💕 연애 스타일</h3>
                    <p class="section-text" id="ms-love"></p>
                </div>
                <div class="result-section">
                    <h3>💼 추천 직업</h3>
                    <p class="section-text" id="ms-job"></p>
                </div>
                <div class="result-section">
                    <h3>🤝 궁합</h3>
                    <p class="section-text" id="ms-compat"></p>
                </div>

                <!-- 추천 상품 -->
                <div class="product-section">
                    <h3>🛍️ 내 유형 추천 아이템</h3>
                    <p class="product-sub">쿠팡 파트너스 활동을 통해 일정액의 수수료를 받을 수 있습니다</p>
                    <div id="ms-products"></div>
                </div>

                <!-- 공유 버튼 -->
                <div class="share-section">
                    <h3>📢 친구에게 공유하기</h3>
                    <p class="share-sub">친구의 MBTI도 알아보세요!</p>
                    <button class="share-btn copy" onclick="msShare()">🔗 링크 복사하기</button>
                </div>

                <button class="btn-retry" onclick="msRetry()">🔄 다시 테스트하기</button>
            </div>
        </div>
    </div>

    <script src="js/mbti.js"></script>
