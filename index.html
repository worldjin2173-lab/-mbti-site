<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 MBTI 유형 검사하기 - 나의 진짜 성격은?</title>
    <link rel="stylesheet" href="css/style.css">

    <!-- SEO -->
    <meta name="description" content="나의 진짜 성격 유형은? 20가지 질문으로 알아보는 MBTI 테스트! 지금 바로 시작해보세요 ✨" />
    <meta name="keywords" content="MBTI 테스트, 성격유형검사, MBTI 무료, MBTI 검사, 성격테스트" />

    <!-- Open Graph -->
    <meta property="og:title" content="🔮 MBTI 유형 검사하기" />
    <meta property="og:description" content="나의 진짜 성격 유형은? 20가지 질문으로 알아보는 MBTI 테스트!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sarangspeak.com/mbti" />
   <meta property="og:image" content="https://worldjin2173-lab.github.io/-mbti-site/images/og-image.jpg" />/>
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="심리테스트 연구소" />
</head>
<body>
    <!-- 시작 화면 -->
    <div id="start-screen" class="screen active">
        <div class="container">
            <div class="emoji-big">🔮</div>
            <h1>MBTI 유형 검사하기</h1>
            <p class="subtitle">20가지 질문으로 알아보는<br>나의 진짜 성격 유형</p>
            <div class="stats">
                <span>👥 누적 참여 1,128,492명</span>
            </div>
            <button class="btn-start" onclick="startTest()">✨ 테스트 시작하기 →</button>
            <p class="notice">※ 약 3분 소요 · 무료</p>
        </div>
    </div>

    <!-- 테스트 화면 -->
    <div id="test-screen" class="screen">
        <div class="container">
            <div class="progress-wrap">
                <div class="progress-info">
                    <span id="progress-text">1 / 20</span>
                    <span id="progress-pct">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
            <div class="question-card">
                <div class="q-emoji" id="q-emoji"></div>
                <h2 class="question" id="question-text"></h2>
            </div>
            <div class="answers">
                <button class="answer-btn" id="btn-a" onclick="answer('a')"></button>
                <button class="answer-btn" id="btn-b" onclick="answer('b')"></button>
            </div>
        </div>
    </div>

    <!-- 로딩 화면 -->
    <div id="loading-screen" class="screen">
        <div class="container">
            <div class="loading-emoji">🔮</div>
            <h2>분석 중...</h2>
            <p>당신의 성격 유형을 분석하고 있어요</p>
            <div class="loading-bar">
                <div class="loading-fill" id="loading-fill"></div>
            </div>
        </div>
    </div>

    <script src="js/mbti.js"></script>
</body>
</html>
